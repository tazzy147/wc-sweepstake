<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 Office Sweepstake</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --green:#E1F5EE;--green-text:#085041;--green-border:#9FE1CB;
  --red:#FCEBEB;--red-text:#791F1F;
  --gold-bg:#FAEEDA;--gold-text:#633806;--gold-border:#FAC775;
  --silver-bg:#F1EFE8;--silver-text:#444441;--silver-border:#D3D1C7;
  --bronze-bg:#FAECE7;--bronze-text:#712B13;--bronze-border:#F5C4B3;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#9a9a95;--text3:#6b6b67;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --green:#0d2a1e;--green-text:#5DCAA5;--green-border:#1D6B50;
    --red:#2e1010;--red-text:#F09595;
    --gold-bg:#2e2410;--gold-text:#FAC775;--gold-border:#7a5c1a;
    --silver-bg:#252523;--silver-text:#D3D1C7;--silver-border:#4a4a44;
    --bronze-bg:#2e1a10;--bronze-text:#F5C4B3;--bronze-border:#7a3a1a;
    --purple-bg:#1e1d3a;--purple-text:#AFA9EC;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
h1{font-size:21px;font-weight:600;margin-bottom:2px}
.sub{font-size:12px;color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius);border:.5px solid var(--border2);font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2)}
.btn:hover{background:var(--bg2)}
.btn:disabled{opacity:.45;cursor:default}
.prizes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:520px){.prizes{grid-template-columns:1fr}}
.prize-card{padding:.9rem 1rem;border-radius:var(--radius-lg);border:.5px solid var(--border);background:var(--bg2);text-align:center}
.prize-card.gold{border-color:var(--gold-border);background:var(--gold-bg)}
.prize-card.silver{border-color:var(--silver-border);background:var(--silver-bg)}
.prize-card.bronze{border-color:var(--bronze-border);background:var(--bronze-bg)}
.prize-icon{font-size:24px;margin-bottom:5px}
.prize-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.gold .prize-label{color:var(--gold-text)}.silver .prize-label{color:var(--silver-text)}.bronze .prize-label{color:var(--bronze-text)}
.prize-name{font-size:14px;font-weight:600}
.prize-team{font-size:11px;color:var(--text2);margin-top:2px}
.prize-tbd{font-size:12px;color:var(--text3);font-style:italic}
.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:var(--radius);border:.5px solid var(--border2);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text2)}
.tab:hover{background:var(--bg2)}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-weight:600;font-size:10px;color:var(--text2);border-bottom:.5px solid var(--border);text-transform:uppercase;letter-spacing:.05em;background:var(--bg2)}
td{padding:9px 12px;border-bottom:.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.out td{opacity:.38}
tr.out .pname{text-decoration:line-through}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.b-winner{background:var(--gold-bg);color:var(--gold-text)}
.b-finalist{background:var(--purple-bg);color:var(--purple-text)}
.b-active{background:var(--green);color:var(--green-text)}
.b-out{background:var(--bg2);color:var(--text3)}
.b-concede{background:var(--red);color:var(--red-text)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--bg2);color:var(--text2);margin:1px;border:.5px solid var(--border)}
.tag.alive{background:var(--green);color:var(--green-text);border-color:var(--green-border)}
.tag.dead{opacity:.45;text-decoration:line-through}
.slabel{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px;padding-left:2px}
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.date-nav select{padding:5px 10px;border-radius:var(--radius);border:.5px solid var(--border2);font-size:13px;background:var(--bg);color:var(--text);cursor:pointer}
.date-btn{padding:5px 10px;border-radius:var(--radius);border:.5px solid var(--border2);font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2)}
.date-btn:hover{background:var(--bg2)}
.date-btn:disabled{opacity:.4;cursor:default}
.match-card{background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-bottom:7px;display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;gap:6px;font-size:13px;border:.5px solid var(--border)}
.mhome{text-align:right}.maway{text-align:left}
.mcenter{text-align:center}
.score{font-weight:700;font-size:15px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#E24B4A;display:inline-block;margin-right:3px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.s-live{color:#A32D2D;font-size:10px;display:flex;align-items:center;justify-content:center}
.s-ft{color:var(--text3);font-size:10px}
.s-pre{color:var(--text3);font-size:10px}
.no-data{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px}
.err-banner{background:var(--red);color:var(--red-text);border-radius:var(--radius);padding:10px 14px;font-size:12px;margin-bottom:12px;display:none}
.pname{font-weight:600}
.concede-num{font-weight:700;color:#A32D2D}
.cl{border-left:2px solid #E24B4A;padding-left:8px}
.last-upd{font-size:11px;color:var(--text3);text-align:right;margin-top:14px}
.topright{display:flex;gap:8px;align-items:center}
.fetch-status{font-size:11px;color:var(--text3)}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.round-label{font-size:10px;color:var(--text3);text-align:center;margin-top:2px}
@media(max-width:600px){td,th{padding:7px 8px}.match-card{grid-template-columns:1fr 70px 1fr;font-size:12px}}
</style>
</head>
<body>
<div class="page">

<div class="topbar">
  <div>
    <h1>&#x26BD; WC2026 Office Sweepstake</h1>
    <div class="sub" id="sub-line">Loading&#x2026;</div>
  </div>
  <div class="topright">
    <span class="fetch-status" id="fetch-status"></span>
    <button class="btn" id="refresh-btn" onclick="fullRefresh()">&#x21BB; Refresh</button>
  </div>
</div>

<div class="err-banner" id="err-banner"></div>

<div class="prizes">
  <div class="prize-card gold"><div class="prize-icon">&#x1F947;</div><div class="prize-label">World Cup Winner</div><div id="p1"><div class="prize-tbd">TBD</div></div></div>
  <div class="prize-card silver"><div class="prize-icon">&#x1F948;</div><div class="prize-label">Finalist (runner-up)</div><div id="p2"><div class="prize-tbd">TBD</div></div></div>
  <div class="prize-card bronze"><div class="prize-icon">&#x1F949;</div><div class="prize-label">Most goals conceded</div><div id="p3"><div class="prize-tbd">In progress&#x2026;</div></div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('tracker')">Who's Still In</button>
  <button class="tab" onclick="showTab('concede')">Goals Conceded</button>
  <button class="tab" onclick="showTab('scores')">Scores &amp; Fixtures</button>
</div>

<div id="tracker" class="section active"><div id="tracker-content"><div class="no-data">Loading&#x2026;</div></div></div>
<div id="concede" class="section"><div id="concede-content"><div class="no-data">Loading&#x2026;</div></div></div>
<div id="scores" class="section">
  <div class="date-nav">
    <button class="date-btn" id="prev-day" onclick="changeDay(-1)">&#x2039; Prev</button>
    <select id="day-select" onchange="selectDay(this.value)"></select>
    <button class="date-btn" id="next-day" onclick="changeDay(1)">Next &#x203A;</button>
  </div>
  <div id="scores-content"><div class="no-data">Loading&#x2026;</div></div>
</div>

<div class="last-upd" id="last-upd"></div>
</div>

<script>
var PARTICIPANTS=[{name:"Abi Case",teams:["Australia"]},{name:"MAX",teams:["DR Congo"]},{name:"Dan",teams:["Panama","Ghana"]},{name:"Maria",teams:["Sweden"]},{name:"Alex",teams:["Austria","Ecuador","Iraq","New Zealand"]},{name:"Michael Benedetto",teams:["Belgium","Japan","Canada","Uruguay"]},{name:"Isabelle Bettany",teams:["Czechia","Argentina"]},{name:"Jaci Lott",teams:["South Africa"]},{name:"Steve",teams:["Egypt","Netherlands"]},{name:"Georgie",teams:["France","Bosnia"]},{name:"Barry",teams:["Morocco"]},{name:"Marie",teams:["Jordan","Iran"]},{name:"Matt C",teams:["Turkey"]},{name:"Lucia",teams:["Norway","USA"]},{name:"Lisa",teams:["Curacao"]},{name:"Jess",teams:["Mexico","South Korea"]},{name:"matt W",teams:["Senegal"]},{name:"Sarah O",teams:["England"]},{name:"Helen Endacott",teams:["Algeria"]},{name:"Sofie-Eliza Price",teams:["Uzbekistan"]},{name:"Megan",teams:["Portugal","Qatar"]},{name:"Abi Comber",teams:["Paraguay"]},{name:"Nikisha",teams:["Brazil"]},{name:"Jill",teams:["Colombia"]},{name:"Franeo",teams:["Cabo Verde","Tunisia"]},{name:"Caroline Raby",teams:["Scotland"]},{name:"Carlos",teams:["Switzerland"]},{name:"Yemi",teams:["Croatia","Saudi Arabia"]},{name:"Tarun",teams:["Spain","Germany"]},{name:"Aaidah",teams:["Haiti"]},{name:"Kristina",teams:["Cote d'Ivoire"]}];

var FLAGS={"Spain":"ES","Germany":"DE","France":"FR","Brazil":"BR","England":"GB-ENG","Argentina":"AR","Portugal":"PT","Netherlands":"NL","Belgium":"BE","USA":"US","Mexico":"MX","Canada":"CA","Uruguay":"UY","Colombia":"CO","Switzerland":"CH","Japan":"JP","South Korea":"KR","Morocco":"MA","Senegal":"SN","Cote d'Ivoire":"CI","Australia":"AU","Turkey":"TR","Croatia":"HR","Ecuador":"EC","Sweden":"SE","Saudi Arabia":"SA","Iran":"IR","Scotland":"GB-SCT","Norway":"NO","Austria":"AT","Czechia":"CZ","Paraguay":"PY","DR Congo":"CD","Panama":"PA","South Africa":"ZA","Egypt":"EG","Jordan":"JO","Curacao":"CW","Ghana":"GH","Algeria":"DZ","Uzbekistan":"UZ","Qatar":"QA","Cabo Verde":"CV","Bosnia":"BA","Iraq":"IQ","New Zealand":"NZ","Haiti":"HT","Tunisia":"TN"};
function flag(team){
  var code=FLAGS[team];
  if(!code) return '';
  if(code==='GB-ENG') return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
  if(code==='GB-SCT') return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC73\uDB40\uDC63\uDB40\uDC74\uDB40\uDC7F';
  return code.split('').map(function(l){return String.fromCodePoint(0x1F1E6+l.charCodeAt(0)-65);}).join('');
}

var NAME_MAP={"United States":"USA","United States of America":"USA","US":"USA","Ivory Coast":"Cote d'Ivoire","C\u00F4te d'Ivoire":"Cote d'Ivoire","Bosnia and Herzegovina":"Bosnia","Bosnia & Herzegovina":"Bosnia","Bosnia-Herzegovina":"Bosnia","Korea Republic":"South Korea","Republic of Korea":"South Korea","Cape Verde":"Cabo Verde","Cura\u00E7ao":"Curacao","Congo DR":"DR Congo","Congo, DR":"DR Congo","Dem. Rep. Congo":"DR Congo","Czech Republic":"Czechia","T\u00FCrkiye":"Turkey","Turkiye":"Turkey"};
function norm(n){return NAME_MAP[n]||n;}

var TZ_START='20260611';
var TZ_END='20260719';
var allMatches=[];
var teamStats={};
var currentDay=null;

function toYMD(d){return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());}
function pad(n){return n<10?'0'+n:String(n);}
function todayStr(){return toYMD(new Date());}

function setStatus(msg){
  document.getElementById('fetch-status').innerHTML=msg?'<span class="spinner"></span>'+msg:'';
}
function showError(msg){
  var el=document.getElementById('err-banner');
  if(msg){el.textContent=msg;el.style.display='block';}
  else el.style.display='none';
}

async function fetchAllMatches(){
  setStatus('Fetching results\u2026');
  var url='/.netlify/functions/espn?dates='+TZ_START+'-'+TZ_END;
  try{
    var r=await fetch(url);
    if(!r.ok) throw new Error('Proxy returned '+r.status);
    var d=await r.json();
    setStatus('');
    showError(null);
    return parseESPN(d);
  }catch(e){
    setStatus('');
    showError('Could not fetch match data ('+e.message+'). Will retry automatically in 2 minutes.');
    console.warn(e);
    return [];
  }
}

function parseESPN(data){
  if(!data||!data.events) return [];
  return data.events.map(function(ev){
    var comp=ev.competitions&&ev.competitions[0];
    if(!comp) return null;
    var home=comp.competitors.find(function(c){return c.homeAway==='home';});
    var away=comp.competitors.find(function(c){return c.homeAway==='away';});
    var status=comp.status||{};
    var st=(status.type&&status.type.state)||'pre';
    var roundNote=(comp.notes&&comp.notes[0]&&comp.notes[0].headline)||'';
    var round=roundNote||(ev.season&&ev.season.slug)||'Group Stage';
    var dt=new Date(ev.date);
    // Penalty shootout winner detection
    var homeShootout=home&&home.shootoutScore!=null?parseInt(home.shootoutScore):null;
    var awayShootout=away&&away.shootoutScore!=null?parseInt(away.shootoutScore):null;
    return{
      id:ev.id,date:dt,dayStr:toYMD(dt),
      homeTeam:norm(home&&home.team.displayName||''),
      awayTeam:norm(away&&away.team.displayName||''),
      homeScore:parseInt(home&&home.score)||0,
      awayScore:parseInt(away&&away.score)||0,
      homeShootout:homeShootout,awayShootout:awayShootout,
      state:st,clock:status.displayClock||'',round:round
    };
  }).filter(Boolean);
}

var STAGE_ORDER=["Group","R32","R16","QF","SF","Final","Winner"];
function detectStage(round){
  var r=(round||'').toLowerCase();
  if((r.includes('final')||r==='championship')&&!r.includes('semi')&&!r.includes('quarter')&&!r.includes('round of')&&!r.includes('third')) return 'Final';
  if(r.includes('semi')) return 'SF';
  if(r.includes('quarter')) return 'QF';
  if(r.includes('round of 16')||r.includes('r16')||r.includes('last 16')) return 'R16';
  if(r.includes('round of 32')||r.includes('r32')||r.includes('last 32')) return 'R32';
  return 'Group';
}

// Determine match winner accounting for penalty shootouts
function matchWinner(m){
  if(m.homeScore>m.awayScore) return m.homeTeam;
  if(m.awayScore>m.homeScore) return m.awayTeam;
  if(m.homeShootout!=null&&m.awayShootout!=null){
    return m.homeShootout>m.awayShootout?m.homeTeam:m.awayTeam;
  }
  return null; // draw (group stage)
}

function buildStats(matches){
  var allTeams=[...new Set(PARTICIPANTS.flatMap(function(p){return p.teams;}))];
  var stats={};
  allTeams.forEach(function(t){stats[t]={conceded:0,gf:0,played:0,stage:'Group',eliminated:false,champion:false,finalist:false};});
  matches.filter(function(m){return m.state==='post';}).forEach(function(m){
    var stage=detectStage(m.round);
    [[m.homeTeam,m.homeScore,m.awayScore],[m.awayTeam,m.awayScore,m.homeScore]].forEach(function(arr){
      var t=arr[0],scored=arr[1],against=arr[2];
      if(!stats[t]) return;
      stats[t].conceded+=against;stats[t].gf+=scored;stats[t].played++;
      if(STAGE_ORDER.indexOf(stage)>STAGE_ORDER.indexOf(stats[t].stage)) stats[t].stage=stage;
    });
    if(stage==='Final'){
      var w=matchWinner(m);
      if(w){
        var l=w===m.homeTeam?m.awayTeam:m.homeTeam;
        if(stats[w]) stats[w].champion=true;
        if(stats[l]) stats[l].finalist=true;
      }
    }
  });
  // Elimination: lost a knockout game (accounting for pens), or finished group with no upcoming games
  allTeams.forEach(function(t){
    if(!stats[t]||stats[t].champion||stats[t].finalist) return;
    var finished=matches.filter(function(m){return m.state==='post'&&(m.homeTeam===t||m.awayTeam===t);});
    var upcoming=matches.filter(function(m){return m.state!=='post'&&(m.homeTeam===t||m.awayTeam===t);});
    if(finished.length>0&&upcoming.length===0){
      var last=finished.sort(function(a,b){return b.date-a.date;})[0];
      var stage=detectStage(last.round);
      if(stage!=='Group'){
        var w=matchWinner(last);
        if(w&&w!==t) stats[t].eliminated=true;
      }else if(finished.length>=3){
        // Played all 3 group games, no knockout fixture scheduled = didn't qualify
        stats[t].eliminated=true;
      }
    }
  });
  return stats;
}

function renderTracker(){
  var stats=teamStats;
  var rows=PARTICIPANTS.map(function(p){
    var ts=p.teams.map(function(t){return{team:t,s:stats[t]||{}};});
    return Object.assign({},p,{ts:ts,champion:ts.find(function(x){return x.s.champion;}),finalist:ts.find(function(x){return x.s.finalist;}),allOut:ts.every(function(x){return x.s.eliminated;})});
  });
  var champions=rows.filter(function(r){return r.champion;});
  var finalists=rows.filter(function(r){return !r.champion&&r.finalist;});
  var stillIn=rows.filter(function(r){return !r.champion&&!r.finalist&&!r.allOut;});
  var out=rows.filter(function(r){return r.allOut;});
  var html='';
  if(champions.length) html+='<div class="slabel">&#x1F3C6; Champion</div>'+makeTrackerTable(champions,false);
  if(finalists.length) html+='<div class="slabel">&#x1F948; Finalist</div>'+makeTrackerTable(finalists,false);
  if(stillIn.length) html+='<div class="slabel">Still in it ('+stillIn.length+')</div>'+makeTrackerTable(stillIn,false);
  if(out.length) html+='<div class="slabel">Eliminated ('+out.length+')</div>'+makeTrackerTable(out,true);
  if(!html) html='<div class="no-data">Waiting for match results.</div>';
  document.getElementById('tracker-content').innerHTML=html;
}

function makeTrackerTable(rows,isOut){
  var h='<div class="card"><table><thead><tr><th>Participant</th><th>Teams</th><th>Status</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var tags=r.ts.map(function(x){
      var alive=!x.s.eliminated&&!x.s.champion&&!x.s.finalist;
      var cls=(x.s.champion||x.s.finalist||alive)?'alive':'dead';
      return '<span class="tag '+cls+'">'+flag(x.team)+' '+x.team+'</span>';
    }).join('');
    var badge=r.champion?'<span class="badge b-winner">&#x1F3C6; Champion</span>':r.finalist?'<span class="badge b-finalist">&#x1F948; Finalist</span>':r.allOut?'<span class="badge b-out">Eliminated</span>':'<span class="badge b-active">Active</span>';
    h+='<tr class="'+(isOut?'out':'')+'"><td><span class="pname">'+r.name+'</span></td><td>'+tags+'</td><td>'+badge+'</td></tr>';
  });
  return h+'</tbody></table></div>';
}

function renderConcede(){
  var rows=PARTICIPANTS.map(function(p){
    var total=p.teams.reduce(function(s,t){return s+((teamStats[t]&&teamStats[t].conceded)||0);},0);
    var breakdown=p.teams.map(function(t){var c=(teamStats[t]&&teamStats[t].conceded)||0;return '<span class="tag">'+flag(t)+' '+t+': <strong>'+c+'</strong></span>';}).join('');
    return{name:p.name,total:total,breakdown:breakdown};
  }).sort(function(a,b){return b.total-a.total;});
  var max=rows[0]&&rows[0].total;
  var h='<div class="card"><table><thead><tr><th>#</th><th>Participant</th><th>Teams</th><th style="text-align:right">Conceded</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    var lead=r.total===max&&max>0;
    h+='<tr><td style="color:var(--text3);font-size:12px">'+(i+1)+'</td><td class="'+(lead?'cl':'')+'"><span class="pname">'+r.name+'</span>'+(lead?' <span class="badge b-concede">&#x1F949; leading</span>':'')+'</td><td>'+r.breakdown+'</td><td style="text-align:right"><span class="concede-num">'+r.total+'</span></td></tr>';
  });
  document.getElementById('concede-content').innerHTML=h+'</tbody></table></div>';
}

function buildDayList(){
  var days=new Set(allMatches.map(function(m){return m.dayStr;}));
  days.add(todayStr());
  return Array.from(days).sort();
}

function populateDaySelect(){
  var days=buildDayList();
  var sel=document.getElementById('day-select');
  sel.innerHTML='';
  var today=todayStr();
  days.forEach(function(d){
    var opt=document.createElement('option');
    opt.value=d;
    var dt=new Date(d+'T12:00:00Z');
    opt.textContent=dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+(d===today?' (today)':'');
    sel.appendChild(opt);
  });
  if(!currentDay||!days.includes(currentDay)){
    currentDay=days.includes(today)?today:(days.find(function(d){return d>=today;})||days[days.length-1]);
  }
  sel.value=currentDay;
  document.getElementById('prev-day').disabled=days.indexOf(currentDay)<=0;
  document.getElementById('next-day').disabled=days.indexOf(currentDay)>=days.length-1;
}

function changeDay(dir){
  var days=buildDayList();
  var idx=days.indexOf(currentDay);
  var next=days[idx+dir];
  if(next){currentDay=next;populateDaySelect();renderScores();}
}
function selectDay(val){currentDay=val;populateDaySelect();renderScores();}

var sweepTeamsSet=new Set(PARTICIPANTS.flatMap(function(p){return p.teams;}));
function ownerOf(team){
  var p=PARTICIPANTS.find(function(p){return p.teams.includes(team);});
  return p?p.name:null;
}

function renderScores(){
  populateDaySelect();
  var matches=allMatches.filter(function(m){return m.dayStr===currentDay;});
  if(!matches.length){
    document.getElementById('scores-content').innerHTML='<div class="no-data">No matches scheduled for this date.</div>';
    return;
  }
  matches.sort(function(a,b){return a.date-b.date;});
  var h='';
  matches.forEach(function(m){
    var hf=flag(m.homeTeam),af=flag(m.awayTeam);
    var hOwner=ownerOf(m.homeTeam),aOwner=ownerOf(m.awayTeam);
    var st='';
    if(m.state==='in') st='<div class="s-live"><span class="live-dot"></span>LIVE '+m.clock+'</div>';
    else if(m.state==='post') st='<div class="s-ft">FT'+(m.homeShootout!=null?' (pens '+m.homeShootout+'-'+m.awayShootout+')':'')+'</div>';
    else st='<div class="s-pre">'+m.date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+'</div>';
    var sc=m.state!=='pre'?m.homeScore+' \u2013 '+m.awayScore:'vs';
    h+='<div class="match-card">'+
      '<div class="mhome">'+hf+' '+m.homeTeam+(hOwner?'<div style="font-size:10px;color:var(--text3)">'+hOwner+'</div>':'')+'</div>'+
      '<div class="mcenter"><div class="score">'+sc+'</div>'+st+'<div class="round-label">'+m.round.replace(/ - .*/,'')+'</div></div>'+
      '<div class="maway">'+af+' '+m.awayTeam+(aOwner?'<div style="font-size:10px;color:var(--text3)">'+aOwner+'</div>':'')+'</div>'+
    '</div>';
  });
  document.getElementById('scores-content').innerHTML=h;
}

function updatePrizes(){
  var allTeams=[...new Set(PARTICIPANTS.flatMap(function(p){return p.teams;}))];
  var champ=allTeams.find(function(t){return teamStats[t]&&teamStats[t].champion;});
  var fin=allTeams.find(function(t){return teamStats[t]&&teamStats[t].finalist;});
  if(champ){var o=ownerOf(champ);if(o) document.getElementById('p1').innerHTML='<div class="prize-name">'+o+'</div><div class="prize-team">'+flag(champ)+' '+champ+'</div>';}
  if(fin){var o2=ownerOf(fin);if(o2) document.getElementById('p2').innerHTML='<div class="prize-name">'+o2+'</div><div class="prize-team">'+flag(fin)+' '+fin+'</div>';}
  var cr=PARTICIPANTS.map(function(p){return{name:p.name,total:p.teams.reduce(function(s,t){return s+((teamStats[t]&&teamStats[t].conceded)||0);},0)};}).sort(function(a,b){return b.total-a.total;});
  if(cr[0]&&cr[0].total>0) document.getElementById('p3').innerHTML='<div class="prize-name">'+cr[0].name+'</div><div class="prize-team">'+cr[0].total+' goals conceded</div>';
}

function updateSubLine(){
  var allTeams=[...new Set(PARTICIPANTS.flatMap(function(p){return p.teams;}))];
  var elim=allTeams.filter(function(t){return teamStats[t]&&teamStats[t].eliminated;}).length;
  document.getElementById('sub-line').textContent=(allTeams.length-elim)+' teams active \u00B7 '+elim+' eliminated \u00B7 auto-refreshes every 2 mins';
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',['tracker','concede','scores'][i]===id);});
  document.querySelectorAll('.section').forEach(function(s){s.classList.toggle('active',s.id===id);});
  if(id==='concede') renderConcede();
  if(id==='scores'){populateDaySelect();renderScores();}
}

async function fullRefresh(){
  var btn=document.getElementById('refresh-btn');
  btn.disabled=true;
  var matches=await fetchAllMatches();
  if(matches.length>0) allMatches=matches;
  teamStats=buildStats(allMatches);
  renderTracker();
  renderConcede();
  populateDaySelect();
  renderScores();
  updatePrizes();
  updateSubLine();
  document.getElementById('last-upd').textContent='Last updated: '+new Date().toLocaleTimeString('en-GB');
  btn.disabled=false;
}

fullRefresh();
setInterval(fullRefresh,120000);
</script>
</body>
</html>
